name: Sync Upstream and Auto Translate

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      force_translate:
        description: 'Force re-translate all files even if they exist'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  UPSTREAM_REPO: walkinglabs/awesome-harness-engineering
  UPSTREAM_BRANCH: main
  TRANSLATE_TO: zh-CN

jobs:
  sync-and-translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git || true
          git fetch upstream

      - name: Check for upstream changes
        id: check
        run: |
          MERGE_BASE=$(git merge-base HEAD upstream/${{ env.UPSTREAM_BRANCH }})
          UPSTREAM_HEAD=$(git rev-parse upstream/${{ env.UPSTREAM_BRANCH }})
          if [ "$MERGE_BASE" = "$UPSTREAM_HEAD" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No upstream changes"
            exit 0
          fi
          echo "has_changes=true" >> $GITHUB_OUTPUT
          git diff --name-only "$MERGE_BASE" "$UPSTREAM_HEAD" -- '*.md' ':!LICENSE' ':!*-zh.md' > /tmp/changed_md_files.txt
          cat /tmp/changed_md_files.txt

      - name: Setup Python
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install OpenAI SDK
        if: steps.check.outputs.has_changes == 'true'
        run: pip install openai

      - name: Pull upstream changes
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Merge upstream changes, prefer upstream version for any conflicts
          git merge -X theirs upstream/${{ env.UPSTREAM_BRANCH }} --no-edit

          if [ "${{ github.event.inputs.force_translate }}" = "true" ]; then
            find . -name "*-zh.md" -type f -delete
          fi

      - name: Translate files
        if: steps.check.outputs.has_changes == 'true'
        id: translate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          API_BASE_URL: https://free.v36.cm
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          python3 -c "
          import os, glob
          from openai import OpenAI

          client = OpenAI(api_key=os.environ['OPENAI_API_KEY'], base_url=os.environ['API_BASE_URL'])

          with open('/tmp/changed_md_files.txt') as f:
              files = [l.strip() for l in f if l.strip()]

          count = 0
          for file in files:
              if not os.path.isfile(file): continue
              base = os.path.basename(file, '.md')
              zh_file = os.path.dirname(file) + '/' + base + '-zh.md'
              if base == 'LICENSE': continue
              if os.path.exists(zh_file) and '${{ github.event.inputs.force_translate }}' != 'true':
                  print(f'Skip {file}')
                  continue
              print(f'Translating {file}...')
              with open(file) as f: content = f.read()
              resp = client.chat.completions.create(model='gpt-4o-mini', messages=[{'role':'system','content':'Translate to Simplified Chinese.Keep URLs and formatting.'},{'role':'user','content':content}],temperature=0.3)
              with open(zh_file,'w') as f: f.write(resp.choices[0].message.content)
              print(f'Done: {zh_file}')
              count += 1
          print(f'Translated {count} files')
          "
          echo "translated_count=$count" >> $GITHUB_OUTPUT

      - name: Replace with Chinese
        if: steps.check.outputs.has_changes == 'true'
        run: |
          for base in README CONTRIBUTING; do
            [ -f "$base-zh.md" ] && cp "$base-zh.md" "$base.md" && echo "Replaced: $base.md"
          done
          [ -f ".github/pull_request_template-zh.md" ] && cp ".github/pull_request_template-zh.md" ".github/pull_request_template.md"

      - name: Commit and push
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "chore: auto-sync and translate"
            git push
            echo "Pushed"
          fi
