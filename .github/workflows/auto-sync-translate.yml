name: Sync Upstream and Auto Translate

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      force_translate:
        description: 'Force re-translate all files even if they exist'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  UPSTREAM_REPO: walkinglabs/awesome-harness-engineering
  UPSTREAM_BRANCH: main
  TRANSLATE_TO: zh-CN

jobs:
  sync-and-translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git || true
          git fetch upstream

      - name: Check for upstream changes
        id: check
        run: |
          MERGE_BASE=$(git merge-base HEAD upstream/${{ env.UPSTREAM_BRANCH }})
          UPSTREAM_HEAD=$(git rev-parse upstream/${{ env.UPSTREAM_BRANCH }})
          if [ "$MERGE_BASE" = "$UPSTREAM_HEAD" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No upstream changes"
            exit 0
          fi
          echo "has_changes=true" >> $GITHUB_OUTPUT
          git diff --name-only "$MERGE_BASE" "$UPSTREAM_HEAD" -- '*.md' ':!LICENSE' ':!*-zh.md' > /tmp/changed_md_files.txt
          cat /tmp/changed_md_files.txt

      - name: Setup Python
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install OpenAI SDK
        if: steps.check.outputs.has_changes == 'true'
        run: pip install openai

      - name: Pull upstream changes
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge upstream/${{ env.UPSTREAM_BRANCH }} --no-edit
          if [ "${{ github.event.inputs.force_translate }}" = "true" ]; then
            find . -name "*-zh.md" -type f -delete
            echo "Deleted existing Chinese files"
          fi

      - name: Translate files
        if: steps.check.outputs.has_changes == 'true'
        id: translate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          API_BASE_URL: https://free.v36.cm
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TRANSLATED_COUNT=0
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && continue
            base=$(basename "$file" .md)
            dir=$(dirname "$file")
            zh_file="$dir/${base}-zh.md"
            [[ "$base" == "LICENSE" ]] && continue
            echo "Processing: $file"
            if [ -f "$zh_file" ] && [ "${{ github.event.inputs.force_translate }}" != "true" ]; then
              echo "  Skip: exists"
              continue
            fi
            if [ -n "$OPENAI_API_KEY" ]; then
              echo "  Translating..."
              python3 << 'PYEOF'
import os
from openai import OpenAI

file = os.environ['file']
zh_file = os.environ['zh_file']
api_key = os.environ['OPENAI_API_KEY']
base_url = os.environ['API_BASE_URL']

client = OpenAI(api_key=api_key, base_url=base_url)

with open(file, "r", encoding="utf-8") as f:
    content = f.read()

chunks = []
current_chunk = []
current_length = 0
MAX_CHUNK_CHARS = 5000

for line in content.split('\n'):
    if current_length + len(line) > MAX_CHUNK_CHARS and current_chunk:
        chunks.append('\n'.join(current_chunk))
        current_chunk = [line]
        current_length = len(line)
    else:
        current_chunk.append(line)
        current_length += len(line)
if current_chunk:
    chunks.append('\n'.join(current_chunk))

translated_parts = []
for i, chunk in enumerate(chunks):
    response = client.chat.completions.create(
        model="gpt-4o-mini",
        messages=[
            {"role": "system", "content": "Translate markdown to Simplified Chinese. Keep links, URLs, code blocks, and formatting intact."},
            {"role": "user", "content": f"Translate:\n\n{chunk}"}
        ],
        temperature=0.3
    )
    translated_parts.append(response.choices[0].message.content)
    print(f"  Chunk {i+1}/{len(chunks)}")

with open(zh_file, "w", encoding="utf-8") as f:
    f.write('\n'.join(translated_parts))
print(f"  Done: {zh_file}")
PYEOF
              TRANSLATED_COUNT=$((TRANSLATED_COUNT + 1))
            else
              cp "$file" "$zh_file"
            fi
          done < /tmp/changed_md_files.txt
          echo "translated_count=$TRANSLATED_COUNT" >> $GITHUB_OUTPUT

      - name: Replace with Chinese
        if: steps.check.outputs.has_changes == 'true'
        run: |
          for base in README CONTRIBUTING; do
            zh_file="$base-zh.md"
            en_file="$base.md"
            [ -f "$zh_file" ] && cp "$zh_file" "$en_file" && echo "Replaced: $en_file"
          done
          [ -f ".github/pull_request_template-zh.md" ] && cp ".github/pull_request_template-zh.md" ".github/pull_request_template.md"

      - name: Commit and push
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "chore: auto-sync and translate"
            git push
            echo "Pushed"
          fi
