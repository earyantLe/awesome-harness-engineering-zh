name: Sync Upstream and Auto Translate

on:
  schedule:
    - cron: '0 2 * * *'  # 每天 UTC 2:00 执行（北京时间 10:00）
  workflow_dispatch:
    inputs:
      force_translate:
        description: 'Force re-translate all files even if they exist'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  UPSTREAM_REPO: walkinglabs/awesome-harness-engineering
  UPSTREAM_BRANCH: main
  TRANSLATE_TO: zh-CN

jobs:
  sync-and-translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git || true
          git fetch upstream

      - name: Check for upstream changes
        id: check
        run: |
          MERGE_BASE=$(git merge-base HEAD upstream/${{ env.UPSTREAM_BRANCH }})
          UPSTREAM_HEAD=$(git rev-parse upstream/${{ env.UPSTREAM_BRANCH }})

          if [ "$MERGE_BASE" = "$UPSTREAM_HEAD" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "✅ 没有新的上游变更"
            exit 0
          fi

          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "📝 发现上游变更"

          git diff --name-only "$MERGE_BASE" "$UPSTREAM_HEAD" -- '*.md' ':!LICENSE' ':!*-zh.md' > /tmp/changed_md_files.txt

          echo "变更的文件:"
          cat /tmp/changed_md_files.txt

          FILE_COUNT=$(wc -l < /tmp/changed_md_files.txt)
          echo "file_count=$FILE_COUNT" >> $GITHUB_OUTPUT

      - name: Setup Python
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install OpenAI SDK
        if: steps.check.outputs.has_changes == 'true'
        run: |
          pip install openai

      - name: Pull upstream changes
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge upstream/${{ env.UPSTREAM_BRANCH }} --no-edit

          if [ "${{ github.event.inputs.force_translate }}" = "true" ]; then
            find . -name "*-zh.md" -type f -delete
            echo "🗑️ 已删除所有已有的中文翻译文件"
          fi

      - name: Translate markdown files with GPT-4o-mini
        if: steps.check.outputs.has_changes == 'true'
        id: translate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          API_BASE_URL: https://free.v36.cm
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          CHANGED_FILES=$(cat /tmp/changed_md_files.txt)
          TRANSLATED_COUNT=0

          for file in $CHANGED_FILES; do
            if [ -f "$file" ]; then
              base=$(basename "$file" .md)
              dir=$(dirname "$file")
              zh_file="$dir/${base}-zh.md"

              if [[ "$base" == "LICENSE" ]]; then
                continue
              fi

              echo "📄 处理：$file"

              if [ -f "$zh_file" ] && [ "${{ github.event.inputs.force_translate }}" != "true" ]; then
                echo "   ⏭️  已存在，跳过：$zh_file"
                continue
              fi

              if [ -n "$OPENAI_API_KEY" ]; then
                echo "   → 使用 GPT-4o-mini 翻译..."
                python3 - <<PYTHON
from openai import OpenAI
import os

client = OpenAI(
    api_key="${{ secrets.OPENAI_API_KEY }}",
    base_url="$API_BASE_URL"
)

with open("$file", "r", encoding="utf-8") as f:
    content = f.read()

# 分块翻译避免 token 限制
chunks = []
current_chunk = []
current_length = 0
MAX_CHUNK_CHARS = 5000

for line in content.split('\n'):
    if current_length + len(line) > MAX_CHUNK_CHARS and current_chunk:
        chunks.append('\n'.join(current_chunk))
        current_chunk = [line]
        current_length = len(line)
    else:
        current_chunk.append(line)
        current_length += len(line)

if current_chunk:
    chunks.append('\n'.join(current_chunk))

translated_parts = []
for i, chunk in enumerate(chunks):
    response = client.chat.completions.create(
        model="gpt-4o-mini",
        messages=[{
            "role": "system",
            "content": "You are a professional translator. Translate markdown content to Simplified Chinese (zh-CN). Keep all links, URLs, code blocks, filenames, and formatting intact. Only translate the text content."
        }, {
            "role": "user",
            "content": f"Translate this markdown to Simplified Chinese:\n\n{chunk}"
        }],
        temperature=0.3
    )
    translated_parts.append(response.choices[0].message.content)
    print(f"   完成块 {i+1}/{len(chunks)}")

translated = '\n'.join(translated_parts)

with open("$zh_file", "w", encoding="utf-8") as f:
    f.write(translated)

print(f"   ✓ 翻译完成：$zh_file")
PYTHON
                TRANSLATED_COUNT=$((TRANSLATED_COUNT + 1))
              else
                echo "   ⚠️  未配置 OPENAI_API_KEY，复制原文"
                cp "$file" "$zh_file"
              fi
            fi
          done

          echo "translated_count=$TRANSLATED_COUNT" >> $GITHUB_OUTPUT

      - name: Replace English files with Chinese
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for base in README CONTRIBUTING; do
            zh_file="$base-zh.md"
            en_file="$base.md"
            if [ -f "$zh_file" ]; then
              cp "$en_file" "$en_file.en.bak" 2>/dev/null || true
              cp "$zh_file" "$en_file"
              echo "🔄 已替换：$en_file (中文版)"
            fi
          done

          if [ -f ".github/pull_request_template-zh.md" ]; then
            cp ".github/pull_request_template.md" ".github/pull_request_template.md.en.bak" 2>/dev/null || true
            cp ".github/pull_request_template-zh.md" ".github/pull_request_template.md"
            echo "🔄 已替换：.github/pull_request_template.md (中文版)"
          fi

      - name: Commit and push
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if ! git diff --staged --quiet; then
            git commit -m "chore: sync upstream and auto-translate

            - Sync from: ${{ env.UPSTREAM_REPO }}
            - Translate to: ${{ env.TRANSLATE_TO }}
            - Translated files: ${{ steps.translate.outputs.translated_count }}"

            git push origin ${{ env.TARGET_BRANCH }}
            echo "✅ 推送成功"
          else
            echo "ℹ️  没有需要提交的变更"
          fi

      - name: Close translation issue if exists
        if: steps.check.outputs.has_changes == 'true' && success()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'translation-needed'
            });

            for (const issue of issues) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
              console.log(`Closed issue #${issue.number}`);
            }
